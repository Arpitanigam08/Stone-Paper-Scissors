<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissor</title>
    <link rel="stylesheet" href="game2.css">
</head>

<body>
    <h1> ROCK PAPER SCISSOR </h1>
    <div class="container">
        <div class="box" id="rock">
   <img src="rock.png" />
        </div>
        <div class="box" id="paper">
            <img src="paper.png"/>
        </div>
        <div class="box" id="scissors">
            <img src="scissors.png" />
        </div></div>
    <div class="scores">
        <div class="score ">
            <p id="user">0</p>
            <p>you</p>
        </div>
        <div class=" score">
            <p id="comp">0</p>
            <p>computer</p>
        </div>
    </div>
    <div class="msg">
        <p id="message"> play your move</p>
    </div>
    <script src="game2.js"></script>
</body>

</html>
